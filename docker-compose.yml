services:
  postgres:
    image: postgres:16-alpine
    container_name: graphite-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: graphite
      POSTGRES_PASSWORD: graphite
      POSTGRES_DB: graphite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphite -d graphite"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: graphite-app
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://graphite:graphite@postgres:5432/graphite
      PORT: 3000
    env_file:
      - .env

volumes:
  postgres_data:
